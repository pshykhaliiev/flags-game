<html lang="en">

  <meta charset="UTF-8" />

    :root {
      --sky: #e8f4fd;
      --ocean: #2563eb;
      --ocean-light: #dbeafe;
      --ocean-dark: #1d4ed8;
      --sun: #f59e0b;
      --sun-light: #fef3c7;
      --grass: #16a34a;
      --grass-light: #dcfce7;
      --coral: #ef4444;
      --coral-light: #fee2e2;
      --sand: #fef9f0;
      --ink: #1e293b;
      --muted: #64748b;
      --border: rgba(0,0,0,0.08);
      --gold: #f59e0b;
      --silver: #94a3b8;
      --bronze: #cd7c2f;
      --radius: 16px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--sky);
      color: var(--ink);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
      background-image: radial-gradient(circle at 20% 20%, #c7e8ff 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, #fde8c7 0%, transparent 50%);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ── HEADER ── */
    .app-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .app-logo {
      font-family: 'Fredoka One', cursive;
      font-size: 32px;
      color: var(--ocean);
      letter-spacing: 0.5px;
    }
    .app-logo span { color: var(--sun); }

    /* ── CARDS ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      padding: 2rem 1.5rem;
      max-width: 520px;
      margin: 0 auto 1.25rem;
      text-align: center;
    }

    /* ── NAME SCREEN ── */
    .welcome-emoji { font-size: 80px; line-height: 1; margin-bottom: 1rem; display: block; }
    .welcome-title {
      font-family: 'Fredoka One', cursive;
      font-size: 28px;
      color: var(--ocean);
      margin-bottom: 0.5rem;
    }
    .welcome-sub { font-size: 15px; color: var(--muted); margin-bottom: 2rem; line-height: 1.5; }
    .name-label { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 0.5rem; text-align: left; max-width: 340px; margin-left: auto; margin-right: auto; }
    .name-input {
      width: 100%; max-width: 340px;
      padding: 14px 18px;
      font-size: 17px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      border-radius: var(--radius-sm);
      border: 2px solid #cbd5e1;
      background: var(--sand);
      color: var(--ink);
      margin-bottom: 1.25rem;
      outline: none;
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .name-input:focus { border-color: var(--ocean); box-shadow: 0 0 0 4px var(--ocean-light); }

    .btn {
      display: inline-block;
      padding: 13px 38px;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.3px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--ocean);
      color: #fff;
      box-shadow: 0 4px 0 var(--ocean-dark);
    }
    .btn-primary:hover { box-shadow: 0 6px 0 var(--ocean-dark); transform: translateY(-1px); }
    .btn-primary:disabled { background: #94a3b8; box-shadow: 0 4px 0 #64748b; cursor: default; transform: none; }
    .btn-secondary {
      background: #fff;
      color: var(--ink);
      border: 2px solid var(--border);
      box-shadow: 0 3px 0 rgba(0,0,0,0.1);
    }
    .btn-secondary:hover { box-shadow: 0 5px 0 rgba(0,0,0,0.1); transform: translateY(-1px); }

    /* ── QUIZ SCREEN ── */
    .quiz-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 520px;
      margin: 0 auto 1.25rem;
      gap: 12px;
    }
    .player-pill {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--ocean);
    }
    .score-pills { display: flex; gap: 8px; }
    .score-pill {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      text-align: center;
    }
    .score-pill span { display: block; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .progress-bar-wrap {
      max-width: 520px;
      margin: 0 auto 1.25rem;
      background: rgba(255,255,255,0.6);
      border-radius: 50px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--ocean);
      border-radius: 50px;
      transition: width 0.4s ease;
    }

    .mode-toggle {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1.25rem;
    }
    .mode-btn {
      padding: 7px 16px;
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      border-radius: 50px;
      border: 2px solid var(--border);
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn.active { background: var(--ocean); color: #fff; border-color: var(--ocean); }

    .flag-display { font-size: 96px; line-height: 1; margin-bottom: 1rem; display: block; }
    .country-name { font-family: 'Fredoka One', cursive; font-size: 26px; color: var(--ocean); margin-bottom: 0.5rem; }
    .question-text { font-size: 15px; color: var(--muted); font-weight: 600; margin-bottom: 1.5rem; }

    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .opt-btn {
      background: var(--sand);
      border: 2px solid #e2e8f0;
      border-radius: var(--radius-sm);
      padding: 16px 12px;
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.3;
    }
    .opt-btn:hover:not(:disabled) { background: var(--ocean-light); border-color: var(--ocean); color: var(--ocean); transform: translateY(-2px); }
    .opt-btn.correct { background: var(--grass-light); border-color: var(--grass); color: #14532d; }
    .opt-btn.wrong   { background: var(--coral-light); border-color: var(--coral); color: #7f1d1d; }
    .opt-btn:disabled { cursor: default; transform: none; }

    .feedback-wrap { min-height: 32px; margin: 1rem 0 0.5rem; }
    .feedback {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
    }
    .feedback.ok { background: var(--grass-light); color: #14532d; }
    .feedback.no { background: var(--coral-light); color: #7f1d1d; }

    .next-btn-wrap { margin-top: 0.75rem; }

    /* ── END SCREEN ── */
    .end-emoji { font-size: 80px; line-height: 1; margin-bottom: 1rem; display: block; }
    .end-title { font-family: 'Fredoka One', cursive; font-size: 26px; color: var(--ocean); margin-bottom: 0.5rem; }
    .end-sub { font-size: 15px; color: var(--muted); font-weight: 600; margin-bottom: 0; }

    /* ── LEADERBOARD ── */
    .lb-section { max-width: 520px; margin: 0 auto; }
    .lb-header { text-align: center; margin-bottom: 1rem; }
    .lb-title { font-family: 'Fredoka One', cursive; font-size: 26px; color: var(--ink); margin-bottom: 0.25rem; }
    .lb-sub { font-size: 13px; color: var(--muted); font-weight: 600; }

    .lb-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .lb-table th { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 8px 10px; border-bottom: 2px solid #f1f5f9; text-align: left; }
    .lb-table td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; color: var(--ink); font-weight: 600; vertical-align: middle; }
    .lb-table tr:last-child td { border-bottom: none; }
    .lb-table tr.highlight td { background: var(--ocean-light); color: var(--ocean-dark); font-weight: 700; }

    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 12px; font-weight: 800;
    }
    .rank-1 { background: #fef3c7; color: #92400e; border: 2px solid var(--gold); }
    .rank-2 { background: #f1f5f9; color: #475569; border: 2px solid var(--silver); }
    .rank-3 { background: #fef3c7; color: #7c2d12; border: 2px solid var(--bronze); }
    .rank-n { background: #f8fafc; color: var(--muted); border: 2px solid #e2e8f0; }

    .lb-loading { text-align: center; padding: 2rem; color: var(--muted); font-weight: 600; font-size: 14px; }
    .lb-error { text-align: center; padding: 1rem; color: var(--coral); font-weight: 600; font-size: 13px; }

    .btn-row { display: flex; justify-content: center; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap; }

    .q-num { font-size: 12px; font-weight: 700; color: var(--muted); text-align: center; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.06em; }

    @media (max-width: 420px) {
      .options { grid-template-columns: 1fr; }
      .flag-display { font-size: 72px; }
      .quiz-top { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>

    </div>
  </div>

    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-capital" onclick="setMode('capital')">🏛 Capital city</button>
      <button class="mode-btn" id="mode-country" onclick="setMode('country')">🗺 Country name</button>
    </div>
    <div id="quiz-area"></div>
  </div>

  <!-- SCREEN 3: End + Leaderboard -->
  <div class="screen" id="screen-end">
    <div class="app-header"><div class="app-logo">Flags <span>&</span> Capitals</div></div>
    <div class="card" id="end-card" style="margin-bottom:1.5rem;"></div>
    <div class="lb-section">
      <div class="lb-header">
        <div class="lb-title">🏆 Leaderboard</div>
        <div class="lb-sub">Best scores from all players worldwide</div>
      </div>
      <div class="card" style="padding:1rem 1.25rem;" id="lb-content">
        <div class="lb-loading">Loading scores...</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="playAgain()">Play Again 🎮</button>
        <button class="btn btn-secondary" onclick="changePlayer()">Change Player</button>
      </div>
    </div>
  </div>

function getLocalBest(name) {
  try {
    const data = JSON.parse(localStorage.getItem('fcPersonalBest') || '{}');
    return data[name.toLowerCase()] || 0;
  } catch(e) { return 0; }
}
function setLocalBest(name, score) {
  try {
    const data = JSON.parse(localStorage.getItem('fcPersonalBest') || '{}');
    if (score > (data[name.toLowerCase()] || 0)) data[name.toLowerCase()] = score;
    localStorage.setItem('fcPersonalBest', JSON.stringify(data));
  } catch(e) {}
}

// ── Shared leaderboard via artifact storage API ──
async function fetchLeaderboard() {
  try {
    const result = await window.storage.list('lb:');
    if (!result || !result.keys || result.keys.length === 0) return [];
    const entries = [];
    for (const key of result.keys) {
      try {
        const r = await window.storage.get(key, true);
        if (r) entries.push(JSON.parse(r.value));
      } catch(e) {}
    }
    entries.sort((a, b) => b.best - a.best || a.name.localeCompare(b.name));
    return entries;
  } catch(e) { return null; }
}

async function submitScore(name, score) {
  const key = 'lb:' + name.toLowerCase().replace(/[^a-z0-9]/g, '_');
  try {
    let existing = null;
    try { const r = await window.storage.get(key, true); if (r) existing = JSON.parse(r.value); } catch(e) {}
    if (!existing || score > existing.best) {
      await window.storage.set(key, JSON.stringify({
        name: name,
        best: score,
        total: TOTAL,
        date: new Date().toLocaleDateString()
      }), true);
    }
  } catch(e) {}
}

// ── UI helpers ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

const nameInput = document.getElementById('name-input');
const startBtn  = document.getElementById('start-btn');
nameInput.addEventListener('input', () => { startBtn.disabled = nameInput.value.trim().length < 1; });
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !startBtn.disabled) beginGame(); });

function beginGame() {
  playerName = nameInput.value.trim();
  if (!playerName) return;
  myBest = getLocalBest(playerName);
  document.getElementById('player-tag').textContent = '👤 ' + playerName;
  document.getElementById('best').textContent = myBest;
  showScreen('screen-quiz');
  startGame();
}
function changePlayer() { nameInput.value = ''; startBtn.disabled = true; showScreen('screen-name'); }
function playAgain() { showScreen('screen-quiz'); startGame(); }

function setMode(m) {
  mode = m;
  document.getElementById('mode-capital').classList.toggle('active', m === 'capital');
  document.getElementById('mode-country').classList.toggle('active', m === 'country');
  startGame();
}

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  score = 0; qIndex = 0;
  document.getElementById('score').textContent = 0;
  myBest = getLocalBest(playerName);
  document.getElementById('best').textContent = myBest;
  document.getElementById('progress-bar').style.width = '0%';
  queue = shuffle(data).slice(0, TOTAL);
  nextQuestion();
}

function nextQuestion() {
  if (qIndex >= queue.length) { showEnd(); return; }
  current = queue[qIndex];
  answered = false;
  const pool = data.filter(d => d !== current);
  const wrong = shuffle(pool).slice(0, 3);
  const opts  = shuffle([current, ...wrong]);
  const isCapital = mode === 'capital';
  const correct   = isCapital ? current.capital : current.country;
  const pct = Math.round((qIndex / TOTAL) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';

  let html = `<div class="card">
    <div class="q-num">Question ${qIndex + 1} of ${TOTAL}</div>
    <span class="flag-display">${current.flag}</span>
    <div class="country-name">${isCapital ? current.country : '???'}</div>
    <div class="question-text">${isCapital ? 'What is the capital city?' : 'Which country does this flag belong to?'}</div>
    <div class="options">`;
  opts.forEach((o, i) => {
    const label = isCapital ? o.capital : o.country;
    const s = label.replace(/'/g, "\\'");
    const c = correct.replace(/'/g, "\\'");
    html += `<button class="opt-btn" id="opt${i}" onclick="pick(this,'${s}','${c}')">${label}</button>`;
  });
  html += `</div>
    <div class="feedback-wrap"><span class="feedback" id="feedback" style="display:none"></span></div>
    <div class="next-btn-wrap">
      <button class="btn btn-primary" id="next-btn" style="display:none" onclick="advance()">${qIndex + 1 < TOTAL ? 'Next flag ➜' : 'See results!'}</button>
    </div>
  </div>`;
  document.getElementById('quiz-area').innerHTML = html;
}

function pick(btn, chosen, correct) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('correct');
  });
  const fb = document.getElementById('feedback');
  fb.style.display = 'inline-block';
  if (chosen === correct) {
    btn.classList.add('correct');
    score++;
    document.getElementById('score').textContent = score;
    fb.textContent = '✓ Correct! Well done!';
    fb.className = 'feedback ok';
  } else {
    btn.classList.add('wrong');
    fb.textContent = mode === 'country'
      ? `✗ That's ${current.country}! Capital: ${current.capital}.`
      : `✗ The capital of ${current.country} is ${correct}.`;
    fb.className = 'feedback no';
  }
  document.getElementById('next-btn').style.display = 'inline-block';
}

function advance() { qIndex++; nextQuestion(); }

async function showEnd() {
  document.getElementById('progress-bar').style.width = '100%';
  if (score > myBest) { myBest = score; setLocalBest(playerName, score); }
  document.getElementById('best').textContent = myBest;

  const pct   = Math.round((score / TOTAL) * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '⭐' : pct >= 40 ? '🌍' : '📚';
  const msg   = pct >= 80 ? 'You are a geography star! Amazing!'
              : pct >= 60 ? 'Great job! Keep exploring!'
              : pct >= 40 ? 'Good effort! Practice makes perfect!'
              : 'Keep learning — the world awaits!';

  document.getElementById('end-card').innerHTML = `
    <span class="end-emoji">${emoji}</span>
    <div class="end-title">${playerName}, you scored ${score} / ${TOTAL}!</div>
    <div class="end-sub">${msg}</div>`;

  showScreen('screen-end');
  document.getElementById('lb-content').innerHTML = '<div class="lb-loading">Saving score & loading leaderboard...</div>';

  await submitScore(playerName, score);
  const lb = await fetchLeaderboard();
  renderLeaderboard(lb);
}

function renderLeaderboard(lb) {
  if (lb === null) {
    document.getElementById('lb-content').innerHTML = '<div class="lb-error">Could not load leaderboard. Scores are saved — check back later!</div>';
    return;
  }
  if (lb.length === 0) {
    document.getElementById('lb-content').innerHTML = '<div class="lb-loading" style="color:#16a34a">You are the first player! 🎉</div>';
    return;
  }
  const myRank = lb.findIndex(e => e.name.toLowerCase() === playerName.toLowerCase()) + 1;
  const top = lb.slice(0, 15);
  const rows = top.map((e, i) => {
    const rank  = i + 1;
    const cls   = rank <= 3 ? `rank-${rank}` : 'rank-n';
    const isMe  = e.name.toLowerCase() === playerName.toLowerCase();
    return `<tr class="${isMe ? 'highlight' : ''}">
      <td><span class="rank-badge ${cls}">${rank}</span></td>
      <td>${e.name}${isMe ? ' 👈' : ''}</td>
      <td style="text-align:right">${e.best} / ${e.total || TOTAL}</td>
      <td style="text-align:right;color:#94a3b8;font-size:12px">${e.date}</td>
    </tr>`;
  }).join('');

  document.getElementById('lb-content').innerHTML = `
    <table class="lb-table">
      <thead><tr><th></th><th>Player</th><th style="text-align:right">Best</th><th style="text-align:right">Date</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${myRank > 15 ? `<p style="font-size:13px;color:#94a3b8;text-align:center;padding-top:0.75rem;font-weight:600">Your rank: #${myRank}</p>` : ''}`;
}
</script>
